# fly.toml app configuration file generated for jb-chicago-allergy-eats on 2026-06-29T23:33:03-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jb-chicago-allergy-eats'
primary_region = 'ord'

[build]

[env]
  HOST = '0.0.0.0'
  PORT = '3000'
  PUBLIC_READ_ONLY_REVIEW_STATE = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
